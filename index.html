<head>

<title>تقييم المهارات الإدارية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
// Neon ripple for start button
document.getElementById('startBtn').addEventListener('click', function(e) {
  const btn = this;
  const ripple = document.createElement('span');
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
  btn.appendChild(ripple);
  btn.classList.remove('neon-clicked');
  void btn.offsetWidth;
  btn.classList.add('neon-clicked');
  setTimeout(() => ripple.remove(), 700);
}, true);

// Theme toggle
const themeBtn = document.getElementById('themeToggle');
const knob = themeBtn.querySelector('.toggle-knob');
const savedTheme = localStorage.getItem('outfit_theme') || 'dark';
if (savedTheme === 'light') {
  document.body.classList.add('light');
  knob.textContent = '☀️';
}
themeBtn.addEventListener('click', () => {
  const isLight = document.body.classList.toggle('light');
  knob.textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('outfit_theme', isLight ? 'light' : 'dark');
});
</script>
<style>
:root {
  --bg: #080A0E;
  --surface: #0E1117;
  --surface2: #151B24;
  --surface3: #1C2433;
  --border: #1E2A3A;
  --border2: #243040;
  --text: #F6F9FF;
  --muted: #4A6080;
  --muted2: #6A8090;
  --accent: #00D9FF;
  --accent2: #0099CC;
  --green: #00FF88;
  --red: #FF3366;
  --amber: #FFB020;
  --purple: #8B5CF6;
  --gold: #D4A84B;
  --grid-line: #1a2535;
  --grid-cell: 52px;
  --grid-angle: 65deg;
  --card-glass: rgba(14,17,23,0.75);
  --low:#ff5b6e; --mid:#f2b94e; --high:#34d399;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; min-height: 100dvh; }
body {
  font-family: 'Space Grotesk', 'Cairo', Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

#bg-three {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: var(--bg);
}
#bg-three canvas { display: block; }

.login-grid-wrap {
  position: fixed; inset: 0; z-index: 1; overflow: hidden;
  pointer-events: none; perspective: 200px; opacity: 0.35;
}
.login-grid-plane { position: absolute; inset: 0; transform: rotateX(var(--grid-angle)); }
.login-grid-lines {
  position: absolute; inset: 0%; height: 300vh; width: 600vw; margin-left: -200%;
  background-repeat: repeat;
  background-size: var(--grid-cell) var(--grid-cell);
  background-image:
    linear-gradient(to right, var(--grid-line) 1px, transparent 0),
    linear-gradient(to bottom, var(--grid-line) 1px, transparent 0);
  animation: gridMove 18s linear infinite;
}
@keyframes gridMove { 0% { transform: translateY(-50%); } 100% { transform: translateY(0); } }
.login-grid-fade {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: linear-gradient(to top, var(--bg) 0%, transparent 90%);
}

.login-glow {
  position: fixed; top: 0; left: 0; right: 0; height: 100vh;
  z-index: 1; pointer-events: none;
  background: radial-gradient(ellipse 32% 80% at 50% -18%, rgba(139,92,246,0.22), transparent 70%);
}

.scene {
  position: relative; z-index: 10;
  max-width: 680px; margin: 0 auto;
  padding: clamp(16px,4vw,40px) 18px 80px;
  min-height: 100dvh;
  display: flex; flex-direction: column; justify-content: center;
}

.brand {
  display: flex; align-items: center; gap: 14px;
  justify-content: center; margin-bottom: 28px;
}
.login-logo-wrap {
  position: relative;
  padding: 12px 18px;
  display: inline-flex; align-items: center; justify-content: center;
}
.login-logo-wrap img {
  height: 52px; width: auto; display: block; position: relative; z-index: 2;
}
.logo-particle {
  position: absolute; left: 50%; top: 50%;
  width: 6px; height: 6px; margin: -3px 0 0 -3px;
  border-radius: 50%; background: var(--gold); opacity: 0.35;
  pointer-events: none; z-index: 1;
  box-shadow: 0 0 6px var(--gold);
  transition: transform 0.7s cubic-bezier(.34,1.56,.64,1), opacity 0.4s ease;
}
.login-logo-wrap:hover .logo-particle { opacity: 1; }
.brand-text b {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 4px;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 2px;
}
.brand-text span {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--muted2);
  letter-spacing: 0.5px;
}

.deck {
  background: var(--card-glass);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: clamp(24px,5vw,44px);
  box-shadow: 0 0 90px rgba(255,60,80,0.08), 0 0 60px rgba(139,92,246,0.06), 0 40px 80px rgba(0,0,0,0.5);
  animation: loginFade 0.7s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes loginFade { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }

.screen { display: none; }
.screen.active { display: block; animation: rise 0.45s ease both; }
@keyframes rise { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.hw-wrap {
  position: relative; display: inline-block;
  padding: 14px 30px; margin-bottom: 8px;
}
.hw-svg {
  position: absolute; top: -22px; left: -22px; right: -22px; bottom: -22px;
  width: calc(100% + 44px); height: calc(100% + 44px);
  overflow: visible; pointer-events: none; z-index: 0;
}
.hw-svg path {
  stroke-dasharray: var(--hw-len, 2400);
  animation: hwDraw 5.5s ease-in-out infinite;
}
@keyframes hwDraw {
  0% { stroke-dashoffset: var(--hw-len, 2400); }
  45% { stroke-dashoffset: 0; }
  62% { stroke-dashoffset: 0; }
  100% { stroke-dashoffset: calc(var(--hw-len, 2400) * -1); }
}
.eyebrow {
  font-family: 'Cairo', sans-serif;
  font-size: 16px; letter-spacing: 2px;
  font-weight: 800;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 12px; display: block;
}
h1 {
  position: relative; z-index: 1;
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: clamp(24px, 6vw, 38px);
  line-height: 1.2;
  color: var(--text);
  margin: 0 0 8px;
}
.lede {
  color: var(--muted2); font-size: 14.5px; line-height: 1.75;
  margin: 0 0 24px; font-weight: 300;
}
.divider {
  width: 40px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 24px;
}

.legend {
  display: flex; gap: 6px; flex-wrap: wrap;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  border-radius: 14px; padding: 12px 14px;
  margin-bottom: 22px; font-size: 12px;
  color: var(--muted2); align-items: center;
}
.legend b { color: var(--text); font-weight: 600; }
.legend span {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  border-radius: 999px; padding: 3px 11px;
  font-family: 'Space Mono', monospace; font-size: 11px;
}

.fields { display: grid; gap: 14px; }
.field label {
  display: block; font-weight: 800; font-size: 13px;
  letter-spacing: 1px; margin-bottom: 8px; color: var(--text);
  text-transform: uppercase; font-family: 'Space Mono', monospace; letter-spacing: 1.5px;
}
.field input {
  width: 100%; padding: 14px 18px;
  border: 1px solid var(--border2);
  border-radius: 12px;
  font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600;
  background: rgba(255,255,255,0.04);
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.field input::placeholder { color: var(--muted2); font-weight: 400; }
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(0,217,255,0.12);
}

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; border-radius: 24px;
  padding: 0 24px; height: 64px;
  font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 18px;
  cursor: pointer; color: #ffffff;
  background: linear-gradient(#070707, #070707) padding-box,
              linear-gradient(90deg, #00ff66 0%, #ccff00 28%, #ffb000 52%, #ff3636 76%, #ff2abf 100%) border-box;
  border: 3px solid transparent;
  box-shadow: 0 0 4px rgba(0,255,102,0.15), 0 0 6px rgba(255,45,45,0.10);
  transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
  position: relative; overflow: hidden;
  text-shadow: 0 0 8px rgba(255,255,255,0.5);
}
.btn::before, .btn::after {
  content: '';
  position: absolute; inset: 3px;
  border-radius: 20px;
  background: #070707;
  z-index: -1;
  pointer-events: none;
  opacity: 1;
  transition: none;
  left: 0; right: 0; width: auto; height: auto; margin: 0;
}
.btn::after { display: none; }
.btn::before { top: 0; } .btn::after { bottom: 0; }
.btn:hover::before { opacity: 1; }
.btn:hover {
  transform: translateY(-3px) scale(1.025);
  filter: brightness(1.12);
  box-shadow: 0 0 26px rgba(0,255,102,0.7), 0 0 38px rgba(255,42,191,0.48), inset 0 0 20px rgba(255,255,255,0.06);
}
.btn:active { transform: scale(0.965); }
.btn:disabled { opacity: 0.5; cursor: default; transform: none; }
.btn.ghost {
  background: rgba(255,255,255,0.06);
  color: var(--text); border: 1px solid var(--border2);
  box-shadow: none; font-size: 14px; padding: 12px;
  text-shadow: none;
}
.btn.ghost:hover { transform: none; background: rgba(255,255,255,0.1); border-color: var(--accent); color: var(--accent); }
.mt { margin-top: 0; }
.btnrow { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-top: 22px; }

.inline-msg {
  display: none;
  background: rgba(255,51,102,0.1);
  border: 1px solid rgba(255,51,102,0.3);
  color: #ff9aa6; border-radius: 12px;
  padding: 11px 14px; font-size: 13px; margin-top: 14px;
}
.shake { animation: shake 0.42s; }
@keyframes shake { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-7px)} 40%,60%{transform:translateX(7px)} }

.qhead {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 14px;
}
.qcount {
  font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted);
}
.qcount b { color: var(--text); font-size: 20px; font-weight: 700; }
.bar {
  height: 6px; border-radius: 999px;
  background: rgba(255,255,255,0.08); overflow: hidden; margin-bottom: 30px;
}
.bar > i {
  display: block; height: 100%; width: 0; border-radius: 999px;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  box-shadow: 0 0 14px rgba(0,217,255,0.5);
  transition: width 0.5s cubic-bezier(.2,.8,.2,1);
}
.qbody { min-height: 120px; }
.qbody.flip { animation: flip3d 0.45s cubic-bezier(.2,.8,.2,1); }
@keyframes flip3d { from{opacity:0;transform:rotateY(30deg) translateZ(-40px)} to{opacity:1;transform:none} }
.qtext {
  font-family: 'Cairo', sans-serif; font-weight: 700;
  font-size: clamp(17px,4.5vw,23px);
  line-height: 1.55; margin: 0 0 24px; color: var(--text);
}
.options { display: grid; gap: 10px; }
.opt {
  display: flex; align-items: center; gap: 12px;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,0.04);
  border-radius: 14px; padding: 15px 18px;
  cursor: pointer; font-size: 18px; font-weight: 700;
  text-align: right; color: var(--text);
  transition: transform 0.18s, border-color 0.18s, background 0.18s, box-shadow 0.18s;
  font-family: 'Cairo', sans-serif;
}
.opt:hover {
  transform: translateX(-4px);
  border-color: rgba(0,217,255,0.4);
  background: rgba(0,217,255,0.06);
  box-shadow: 0 8px 24px rgba(0,217,255,0.12);
}
.opt .tick {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--muted);
  display: grid; place-items: center; flex: 0 0 auto;
  transition: 0.18s;
}
.opt .tick svg { width: 12px; height: 12px; opacity: 0; transform: scale(.4); transition: 0.18s; stroke: var(--bg); }
.opt .num {
  font-family: 'Space Mono', monospace; font-weight: 700;
  color: var(--muted); font-size: 12px;
  margin-inline-start: auto;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  border-radius: 8px; padding: 2px 9px;
  min-width: 26px; text-align: center;
}
.opt.sel {
  border-color: var(--accent);
  background: rgba(0,217,255,0.1);
  box-shadow: 0 8px 28px rgba(0,217,255,0.2);
}
.opt.sel .tick { background: var(--accent); border-color: var(--accent); }
.opt.sel .tick svg { opacity: 1; transform: none; }
.opt.sel .num { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }

.result { text-align: center; }
.meta { font-size: 12px; color: var(--muted2); margin-bottom: 4px; font-family: 'Space Mono', monospace; }
.meta b { color: var(--text); font-weight: 600; }
.daytag { font-size: 11px; color: var(--muted); margin-bottom: 16px; font-family: 'Space Mono', monospace; }

.gauge-wrap {
  position: relative; width: 220px; height: 220px;
  margin: 0 auto 16px;
  animation: bob 4s ease-in-out infinite;
}
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.gauge-wrap svg { transform: rotate(-90deg); display: block; }
.gauge-track { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 14; }
.gauge-prog {
  fill: none; stroke-width: 14; stroke-linecap: round;
  filter: drop-shadow(0 0 10px currentColor);
  transition: stroke-dashoffset 1.5s cubic-bezier(.2,.8,.2,1), stroke 0.4s;
}
.gauge-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.score-num {
  font-family: 'Space Mono', monospace; font-weight: 700;
  font-size: 60px; line-height: 1;
}
.outof { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'Space Mono', monospace; }

.badge {
  display: inline-block;
  font-family: 'Space Mono', monospace; font-weight: 700;
  font-size: 11px; letter-spacing: 1px;
  padding: 6px 16px; border-radius: 999px;
  margin: 8px 0 14px;
  animation: popIn 0.5s 1s both;
}
@keyframes popIn { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:none} }
.rtitle {
  font-family: 'Cairo', sans-serif; font-weight: 900;
  font-size: clamp(20px, 5vw, 28px);
  margin: 2px 0 10px;
}
.rtext { color: var(--muted2); font-size: 14.5px; line-height: 1.8; max-width: 46ch; margin: 0 auto 8px; }

.brk-title {
  font-family: 'Space Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  margin: 28px 0 14px; text-align: right; color: var(--muted);
}
.breakdown { display: grid; gap: 14px; text-align: right; }
.brk .top { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; margin-bottom: 7px; }
.brk .top b { font-weight: 600; color: var(--text); }
.brk .top span { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; }
.brk .tr { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.07); overflow: hidden; }
.brk .fl { height: 100%; width: 0; border-radius: 999px; transition: width 1.1s cubic-bezier(.2,.8,.2,1); }

.save-state { font-size: 12px; color: var(--muted); margin-top: 16px; min-height: 20px; font-family: 'Space Mono', monospace; }
.save-state.ok { color: var(--green); } .save-state.err { color: var(--red); }
.spin-dot {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--accent);
  border-radius: 50%; animation: rot 0.7s linear infinite;
  vertical-align: -2px; margin-inline-end: 6px;
}
@keyframes neonPop {
  0% { transform: scale(1); }
  45% { transform: scale(1.09); }
  100% { transform: scale(1); }
}
@keyframes glowBreath {
  0%, 100% { opacity: 0.48; transform: scale(0.98); }
  50% { opacity: 0.72; transform: scale(1.04); }
}
.btn-wrap {
  position: relative;
  display: inline-grid;
  place-items: center;
  width: 100%;
  margin-top: 22px;
}
.btn.neon-clicked {
  animation: neonPop 420ms ease;
}
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  background: radial-gradient(circle, rgba(255,255,255,0.42), rgba(255,42,191,0.16), transparent 65%);
  animation: rippleEffect 700ms ease-out;
  pointer-events: none;
  z-index: 1;
}
@keyframes rippleEffect {
  to { transform: scale(3.8); opacity: 0; }
}
@keyframes rot { to{transform:rotate(360deg)} }

.confetti {
  position: fixed; top: -14px; width: 8px; height: 14px; z-index: 60;
  pointer-events: none; border-radius: 2px;
  animation: fall linear forwards;
}
@keyframes fall { to { transform: translateY(108dvh) rotate(720deg); opacity: 0.8; } }

.live-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--green);
  animation: livePulse 2s infinite; box-shadow: 0 0 8px var(--green);
  vertical-align: middle; margin-inline-end: 6px;
}
@keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

@media (max-width: 520px) { .btnrow { grid-template-columns: 1fr; } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

/* LIGHT THEME */
body.light {
  --bg: #F0F4FF;
  --surface: #FFFFFF;
  --surface2: #E8EDF8;
  --surface3: #DDE3F0;
  --border: #C8D0E0;
  --border2: #B8C4D8;
  --text: #0A1628;
  --muted: #7A90B0;
  --muted2: #4A6080;
  --accent: #0099CC;
  --accent2: #0077AA;
  --green: #00AA55;
  --red: #DD2255;
  --amber: #CC8800;
  --purple: #6633CC;
  --gold: #B8860B;
  --grid-line: #C0CCDD;
  --card-glass: rgba(255,255,255,0.85);
  --low:#dd3355; --mid:#cc8800; --high:#00aa55;
}
body.light #bg-three canvas { opacity: 0.08; }
body.light .login-grid-lines { opacity: 0.5; }
body.light .login-glow { background: radial-gradient(ellipse 32% 80% at 50% -18%, rgba(100,60,220,0.12), transparent 70%); }
body.light .deck {
  background: rgba(255,255,255,0.92);
  border-color: var(--border2);
  box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08);
}
body.light .field input {
  background: rgba(0,0,0,0.04);
  color: var(--text);
  border-color: var(--border2);
}
body.light .field input::placeholder { color: var(--muted); }
body.light .opt {
  background: rgba(0,0,0,0.03);
  border-color: var(--border2);
  color: var(--text);
}
body.light .opt:hover {
  background: rgba(0,153,204,0.08);
  border-color: var(--accent);
}
body.light .opt.sel {
  background: rgba(0,153,204,0.12);
  border-color: var(--accent);
}
body.light .legend {
  background: rgba(0,0,0,0.04);
  border-color: var(--border2);
}
body.light .login-logo-wrap {
  background: transparent;
  border: none;
  box-shadow: none;
}
body.light .login-logo-wrap img {
  mix-blend-mode: normal;
  filter: invert(1) hue-rotate(180deg) saturate(1.5) brightness(0.85);
}
body.light .brand-text b { color: var(--gold); }
body.light .eyebrow { color: var(--gold); }
body.light .btn.ghost {
  background: #f0f4ff !important;
  color: #0A1628 !important;
  border: 2px solid #B8C4D8 !important;
  box-shadow: none !important;
  text-shadow: none !important;
}
body.light .btn.ghost::before,
body.light .btn.ghost::after {
  display: none !important;
}
body.light .btn.ghost:hover {
  background: rgba(0,153,204,0.12) !important;
  border-color: #0099CC !important;
  color: #0099CC !important;
}
body.light .lede { color: var(--muted2); }
body.light .hw-svg path { stroke: var(--gold); opacity: 0.4; }
body.light .bar { background: rgba(0,0,0,0.1); }
body.light .brk .tr { background: rgba(0,0,0,0.08); }

/* THEME TOGGLE BUTTON */
.theme-toggle {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 999;
  width: 56px;
  height: 28px;
  border-radius: 999px;
  border: none;
  background: #1a2a3a;
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 3px;
  transition: background 0.4s ease;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
body.light .theme-toggle {
  background: #b8d4f0;
}
.theme-toggle .toggle-knob {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), background 0.4s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  transform: translateX(0px);
}
body.light .theme-toggle .toggle-knob {
  transform: translateX(28px);
  background: linear-gradient(135deg, #fff9c4, #FFD700);
}
.theme-toggle:hover .toggle-knob {
  box-shadow: 0 0 10px rgba(255,200,0,0.6);
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 600px) {

  /* Scene padding */
  .scene {
    padding: 12px 10px 60px;
    justify-content: flex-start;
    padding-top: 70px;
  }

  /* Brand / Logo */
  .brand {
    flex-direction: column;
    gap: 8px;
    margin-bottom: 18px;
  }
  .login-logo-wrap img {
    height: 42px;
  }
  .brand-text b { font-size: 9px; }
  .brand-text span { font-size: 12px; }

  /* Card */
  .deck {
    padding: 20px 16px 28px;
    border-radius: 18px;
  }

  /* Intro heading */
  h1 { font-size: 22px; }
  .lede { font-size: 13px; }
  .eyebrow { font-size: 13px; }

  /* Legend pills */
  .legend {
    font-size: 11px;
    padding: 10px 10px;
    gap: 4px;
  }
  .legend span { padding: 2px 8px; font-size: 10px; }

  /* Form fields */
  .field input {
    font-size: 15px;
    padding: 12px 14px;
  }
  .field label { font-size: 11px; }

  /* Start button */
  .btn {
    height: 56px;
    font-size: 16px;
    border-radius: 18px;
  }

  /* Quiz screen */
  .qhead { margin-bottom: 10px; }
  .qcount { font-size: 11px; }
  .qcount b { font-size: 17px; }
  .bar { margin-bottom: 20px; }

  .qtext {
    font-size: 17px;
    margin-bottom: 18px;
    line-height: 1.6;
  }

  /* Options */
  .opt {
    font-size: 16px;
    padding: 13px 14px;
    border-radius: 12px;
  }
  .opt .tick { width: 20px; height: 20px; }
  .opt .num { font-size: 11px; padding: 2px 7px; }

  /* Back button */
  #backBtn {
    padding: 6px 12px !important;
    font-size: 13px !important;
  }

  /* Result screen */
  .gauge-wrap {
    width: 180px;
    height: 180px;
  }
  .gauge-wrap svg { width: 180px; height: 180px; }
  .score-num { font-size: 48px; }
  .rtitle { font-size: 18px; }
  .rtext { font-size: 13px; }
  .brk-title { font-size: 9px; }
  .brk .top { font-size: 12px; }
  .brk .top span { font-size: 13px; }

  /* Button row */
  .btnrow {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  /* Theme toggle */
  .theme-toggle {
    top: 14px;
    left: 14px;
    width: 50px;
    height: 26px;
  }
  .theme-toggle .toggle-knob {
    width: 20px;
    height: 20px;
    font-size: 12px;
  }
  body.light .theme-toggle .toggle-knob {
    transform: translateX(24px);
  }

  /* hw-wrap */
  .hw-wrap { padding: 8px 16px; }
  .hw-svg { display: none; }
}

@media (max-width: 380px) {
  h1 { font-size: 19px; }
  .qtext { font-size: 15px; }
  .opt { font-size: 14px; }
  .deck { padding: 16px 12px 22px; }
}
</style>
</head>

          <path id="hw-path" d="M 1000 120 C 1180 250, 1120 430, 850 490 C 550 545, 250 530, 120 410 C 20 310, 60 150, 350 95 C 600 50, 880 60, 1000 130"
            fill="none" stroke="#D4A84B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="eyebrow">تقييم يومي · ٢٠ سؤالاً</span>
        <h1>ما مدى جودة مهاراتك الإدارية؟</h1>
      </div>
      <p class="lede">أجب بصدق بناءً على سلوكك الفعلي اليوم. تستغرق دقيقتين، وتظهر نتيجتك مع تفصيل الكفاءات فورًا.</p>
      <div class="divider"></div>
      <div class="legend">
        <b>المقياس:</b>
        <span>أبدًا ١</span><span>نادرًا ٢</span><span>أحيانًا ٣</span><span>كثيرًا ٤</span><span>دائمًا ٥</span>
      </div>
      <div class="fields">
        <div class="field"><label>الفرع</label><input id="branchName" placeholder="اكتب الفرع"></div>
        <div class="field"><label>اسم الموظف</label><input id="employeeName" placeholder="اكتب اسمك" autocomplete="name"></div>
        <div class="field"><label>المسمى الوظيفي</label><input id="designation" placeholder="اكتب المسمى الوظيفي"></div>
      </div>
      <div class="btn-wrap"><button class="btn" id="startBtn" type="button">ابدأ التقييم →</button></div>
      <div class="inline-msg" id="introMsg">أكمل الفرع والاسم والمسمى الوظيفي للبدء.</div>
    </section>

    <section class="screen" id="screen-quiz">
      <div class="qhead">
        <div class="qcount">السؤال <b id="qNow">1</b> من 20</div>
        <button class="btn ghost" id="backBtn" type="button" style="visibility:hidden;width:auto;padding:8px 16px">→ السابق</button>
      </div>
      <div class="bar"><i id="progFill"></i></div>
      <div class="qbody" id="qBody">
        <p class="qtext" id="qText"></p>
        <div class="options" id="optWrap"></div>
      </div>
    </section>

    <section class="screen result" id="screen-result">
      <p class="meta" id="resMeta"></p>
      <p class="daytag" id="dayTag"></p>
      <div class="gauge-wrap">
        <svg viewBox="0 0 220 220" width="220" height="220">
          <circle class="gauge-track" cx="110" cy="110" r="92"/>
          <circle class="gauge-prog" id="gaugeProg" cx="110" cy="110" r="92"/>
        </svg>
        <div class="gauge-center">
          <div class="score-num" id="scoreNum">0</div>
          <div class="outof">من ١٠٠</div>
        </div>
      </div>
      <div class="badge" id="resBadge"></div>
      <h2 class="rtitle" id="resTitle"></h2>
      <p class="rtext" id="resText"></p>
      <div class="brk-title">تفصيل الكفاءات</div>
      <div class="breakdown" id="breakdown"></div>
      <div class="save-state" id="saveState"></div>
      <div class="btnrow">
        <button class="btn" id="anotherBtn" type="button">تقييم موظف آخر</button>
        <button class="btn ghost" id="restartBtn" type="button">تغيير الفرع</button>
      </div>
    </section>

  </div>
</div>

<script>
(function() {
  const mount = document.getElementById('bg-three');
  if (!mount || typeof THREE === 'undefined') { mount.style.background='#080A0E'; return; }
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x080A0E, 1);
  mount.appendChild(renderer.domElement);

  const curve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(-15, -4, 0),
    new THREE.Vector3(2, 3, 0),
    new THREE.Vector3(18, 0.8, 0)
  );
  const vs = 'varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }';
  const fs = 'uniform float time; varying vec2 vUv; void main(){ vec3 c1=vec3(1.0,0.2,0.1); vec3 c2=vec3(0.8,0.1,0.6); vec3 c3=vec3(0.4,0.05,0.8); vec3 col=mix(c1,c2,vUv.x); col=mix(col,c3,vUv.x*0.7); float glow=1.0-abs(vUv.y-0.5)*2.0; glow=pow(glow,2.0); float fade=1.0; if(vUv.x>0.85){fade=1.0-smoothstep(0.85,1.0,vUv.x);} float pulse=sin(time*2.0)*0.1+0.9; gl_FragColor=vec4(col*glow*pulse*fade, glow*fade*0.85); }';
  const mat = new THREE.ShaderMaterial({ vertexShader: vs, fragmentShader: fs, uniforms: { time: { value: 0 } }, transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(new THREE.TubeGeometry(curve, 200, 0.8, 32, false), mat);
  scene.add(mesh);

  const fs2 = 'uniform float time; varying vec2 vUv; void main(){ vec3 c1=vec3(1.0,0.3,0.2); vec3 c2=vec3(0.6,0.2,0.8); vec3 col=mix(c1,c2,vUv.x); float glow=1.0-abs(vUv.y-0.5)*2.0; glow=pow(glow,4.0); float fade=1.0; if(vUv.x>0.85){fade=1.0-smoothstep(0.85,1.0,vUv.x);} float pulse=sin(time*1.5)*0.05+0.95; gl_FragColor=vec4(col*glow*pulse*fade, glow*fade*0.3); }';
  const mat2 = new THREE.ShaderMaterial({ vertexShader: vs, fragmentShader: fs2, uniforms: { time: { value: 0 } }, transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide });
  const mesh2 = new THREE.Mesh(new THREE.TubeGeometry(curve, 200, 1.5, 32, false), mat2);
  scene.add(mesh2);

  camera.position.z = 7; camera.position.y = -0.8;

  function animate() {
    requestAnimationFrame(animate);
    if (document.hidden) return;
    const t = Date.now() * 0.001;
    mat.uniforms.time.value = t; mat2.uniforms.time.value = t;
    mesh.rotation.z = Math.sin(t * 0.2) * 0.05;
    mesh2.rotation.z = Math.sin(t * 0.2) * 0.05;
    renderer.render(scene, camera);
  }
  animate();
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();

(function() {
  const zone = document.getElementById('logo-wrap');
  if (!zone) return;
  const N = 10, range = 60; const parts = [];
  for (let i = 0; i < N; i++) {
    const p = document.createElement('span'); p.className = 'logo-particle';
    const x = Math.random()*range*2-range, y = Math.random()*range*2-range;
    p.dataset.x = x; p.dataset.y = y;
    p.style.transform = `translate(${x}px, ${y}px)`;
    zone.appendChild(p); parts.push(p);
  }
  const attract = () => parts.forEach(p => p.style.transform = 'translate(0,0)');
  const release = () => parts.forEach(p => p.style.transform = `translate(${p.dataset.x}px, ${p.dataset.y}px)`);
  zone.addEventListener('mouseenter', attract); zone.addEventListener('mouseleave', release);
})();

(function() {
  const path = document.getElementById('hw-path');
  if (!path) return;
  try { const len = path.getTotalLength(); path.style.setProperty('--hw-len', len); path.style.strokeDasharray = len; } catch(e) {}
})();

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzQ1OjQAEp46sEEdfNezrjuVFYY0_SSERB2Ymx84rz18TKDSggln5oIWn8odRxkMK1v/exec';

const questions = [
  {t:"عندما أواجه مشكلة، أحاول حلها بنفسي قبل أن أسأل رئيسي ماذا أفعل.",r:false},
  {t:"عندما أفوض العمل، أعطيه لمن لديه أكبر وقت متاح.",r:true},
  {t:"أتابع مع أعضاء الفريق كلما رأيت أن سلوكهم له تأثير سلبي على خدمة العملاء.",r:false},
  {t:"أتخذ القرارات بعد التحليل الدقيق، بدلًا من الاعتماد على الحدس فقط.",r:false},
  {t:"أترك أعضاء فريقي يكتشفون بأنفسهم أفضل السبل للعمل معًا.",r:true},
  {t:"أنتظر قبل معاقبة أحد أعضاء الفريق، حتى يكون لديه فرصة لتصحيح سلوكياته بنفسه.",r:true},
  {t:"المهارات الفنية هي أهم المهارات التي أحتاجها لكي أكون مديرًا فعالًا.",r:true},
  {t:"أقضي الوقت في التحدث مع فريقي حول ما يجري بشكل جيد وما يحتاج إلى تحسين.",r:false},
  {t:"في الاجتماعات، أقوم بدور الوسيط/الميسر عند الضرورة، وأساعد الفريق للوصول إلى فهم أفضل أو توافق في الرأي.",r:false},
  {t:"أفهم تمامًا كيفية سير عمليات المهام في إدارتي، وأعمل على التخلص من عوائق الإنجاز.",r:false},
  {t:"عند تكوين فريق، أضع في اعتباري المهارات التي أحتاجها ثم أبحث عن الأشخاص الأنسب.",r:false},
  {t:"أفعل كل ما بوسعي لتجنب الصراع في فريقي.",r:true},
  {t:"أحاول تحفيز الأشخاص داخل فريقي من خلال تكييف أسلوبي للتحفيز بما يناسب احتياجات كل فرد.",r:false},
  {t:"عندما يرتكب فريقي خطأً فادحًا، أقوم بإطلاع مديري على ما حدث، ثم أتعامل معه كدرس مهم تعلمته.",r:false},
  {t:"عندما يحدث تعارض داخل فريق جديد، أقبله كمرحلة حتمية في عملية تطوير الفريق.",r:false},
  {t:"أتحدث إلى أعضاء الفريق حول أهدافهم الفردية، وأربطها بأهداف الشركة ككل.",r:false},
  {t:"إذا كنت أقوم بتشكيل فريق، أختار الأشخاص الذين لديهم شخصيات وأعمار وخلفيات متشابهة.",r:true},
  {t:"أعتقد أن عبارة: إذا كنت تريد عملًا جيدًا، افعله بنفسك، صحيحة.",r:true},
  {t:"أتحدث مع أعضاء الفريق كأفراد للتأكد من أنهم سعداء ومنتجون.",r:false},
  {t:"أبلغ أعضاء فريقي بإيجاز حتى يعرفوا ما يدور حولهم في الشركة.",r:false}
];

const categories = [
  {key:'cat_delegation',    name:'التفويض والثقة',            idx:[1,4,17]},
  {key:'cat_communication', name:'التواصل والمتابعة',         idx:[7,8,18,19]},
  {key:'cat_decision',      name:'اتخاذ القرار وحل المشكلات', idx:[0,3,9]},
  {key:'cat_performance',   name:'إدارة الأداء والصراع',      idx:[2,5,11,13,14]},
  {key:'cat_team',          name:'بناء الفريق والتحفيز',      idx:[6,10,12,15,16]}
];

const labels = [["أبدًا",1],["نادرًا",2],["أحيانًا",3],["كثيرًا",4],["دائمًا",5]];
const answers = new Array(questions.length).fill(null);
let idx = 0;

const $  = id => document.getElementById(id);
const screens = { intro:$('screen-intro'), quiz:$('screen-quiz'), result:$('screen-result') };
function show(name){ Object.values(screens).forEach(s=>s.classList.remove('active')); screens[name].classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); }

const tick = `<span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor"><polyline points="20 6 9 17 4 12"></polyline></svg></span>`;
function lvlColor(p){ return p<55?'var(--low)':p<75?'var(--mid)':'var(--high)'; }

try{ const s=localStorage.getItem('swag_branch'); if(s) $('branchName').value=s; }catch(e){}

$('startBtn').addEventListener('click', ()=>{
  const ok = ['branchName','employeeName','designation'].every(id=>$(id).value.trim());
  if(!ok){
    const m=$('introMsg'); m.style.display='block';
    m.classList.remove('shake'); void m.offsetWidth; m.classList.add('shake');
    return;
  }
  try{ localStorage.setItem('swag_branch',$('branchName').value.trim()); }catch(e){}
  $('introMsg').style.display='none';
  idx=0; show('quiz'); renderQuestion();
});

function renderQuestion(){
  const q=questions[idx];
  $('qNow').textContent=idx+1;
  $('progFill').style.width=(idx/questions.length*100)+'%';
  $('backBtn').style.visibility=idx===0?'hidden':'visible';
  $('qText').textContent=q.t;
  const wrap=$('optWrap'); wrap.innerHTML='';
  labels.forEach(([label,val])=>{
    const b=document.createElement('button'); b.type='button';
    b.className='opt'+(answers[idx]===val?' sel':'');
    b.innerHTML=`${tick}<span>${label}</span><span class="num">${val}</span>`;
    b.addEventListener('click',()=>pick(val));
    wrap.appendChild(b);
  });
  const body=$('qBody'); body.classList.remove('flip'); void body.offsetWidth; body.classList.add('flip');
}

function pick(val){
  answers[idx]=val;
  [...$('optWrap').children].forEach(el=>el.classList.toggle('sel',+el.querySelector('.num').textContent===val));
  setTimeout(()=>{ if(idx<questions.length-1){idx++;renderQuestion();}else{finish();} },320);
}
$('backBtn').addEventListener('click',()=>{ if(idx>0){idx--;renderQuestion();} });

function scored(i){ return questions[i].r?(6-answers[i]):answers[i]; }
function computeTotal(){ let t=0; for(let i=0;i<questions.length;i++) t+=scored(i); return t; }
function catScore(cat){ let s=0; cat.idx.forEach(i=>s+=scored(i)); return Math.round(s/(cat.idx.length*5)*100); }

function band(total){
  if(total<=46) return {key:'low',color:'var(--low)',bg:'rgba(255,91,110,.14)',title:'تحتاج إلى تحسين عاجل',text:'مهاراتك الإدارية بحاجة إلى تطوير سريع. ابدأ بأساسيات تنظيم الفريق ومتابعة الأداء، وحدّد عادتين تغيّرهما هذا الأسبوع.'};
  if(total<=73) return {key:'mid',color:'var(--amber)',bg:'rgba(255,176,32,.14)',title:'في طريقك لتصبح مديرًا جيدًا',text:'لديك ممارسات جيدة بالفعل، لكن بعض المجالات تحتاج إلى صقل. ركّز على النقاط التي كانت درجاتك فيها منخفضة.'};
  return {key:'high',color:'var(--green)',bg:'rgba(0,255,136,.14)',title:'أداء إداري رائع',text:'أنت تدير فريقك باقتدار. وجّه طاقتك الآن نحو تطوير الآخرين وربط أهداف الفريق بأهداف الشركة لتصل أبعد.'};
}

function finish(){
  const total=computeTotal(), b=band(total);
  $('progFill').style.width='100%';
  $('resMeta').innerHTML=`<b>${$('employeeName').value.trim()}</b> · ${$('branchName').value.trim()} · ${$('designation').value.trim()}`;
  $('dayTag').textContent='تقييم بتاريخ '+new Intl.DateTimeFormat('ar',{dateStyle:'long'}).format(new Date());
  $('resBadge').textContent=b.title; $('resBadge').style.color=b.color; $('resBadge').style.background=b.bg; $('resBadge').style.border=`1px solid ${b.color}33`;
  $('resTitle').textContent=b.title; $('resText').textContent=b.text;

  const ring=$('gaugeProg'), r=92, C=2*Math.PI*r;
  ring.style.strokeDasharray=C; ring.style.strokeDashoffset=C; ring.style.stroke=b.color;

  const cats=categories.map(c=>({name:c.name,key:c.key,p:catScore(c)}));
  const wrap=$('breakdown'); wrap.innerHTML='';
  cats.forEach(c=>{
    const col=lvlColor(c.p);
    const el=document.createElement('div'); el.className='brk';
    el.innerHTML=`<div class="top"><b>${c.name}</b><span style="color:${col}">${c.p}%</span></div><div class="tr"><i class="fl" style="background:${col}"></i></div>`;
    wrap.appendChild(el);
  });

  show('result');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ring.style.strokeDashoffset=C*(1-total/100);
    [...wrap.querySelectorAll('.fl')].forEach((f,k)=>{f.style.width=cats[k].p+'%';});
  }));
  countUp($('scoreNum'),total,1500);
  if(b.key==='high') burstConfetti();
  saveToSheet(total,b,cats);
}

function countUp(el,to,dur){
  const s=performance.now();
  (function step(now){
    const p=Math.min((now-s)/dur,1);
    el.textContent=Math.round(to*(1-Math.pow(1-p,3)));
    if(p<1) requestAnimationFrame(step); else el.textContent=to;
  })(s);
}

function burstConfetti(){
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const cols=['#00D9FF','#8B5CF6','#FF3366','#FFB020','#00FF88','#D4A84B'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=cols[i%cols.length];
    c.style.animationDuration=(2.4+Math.random()*1.9)+'s';
    c.style.animationDelay=(Math.random()*.5)+'s';
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

async function saveToSheet(total,b,cats){
  const el=$('saveState'); el.innerHTML='<span class="spin-dot"></span> جارٍ حفظ النتيجة...'; el.className='save-state';
  try{
    const payload={employee_name:$('employeeName').value.trim(),branch_name:$('branchName').value.trim(),
      designation:$('designation').value.trim(),total_score:total,band_title:b.title,answers};
    cats.forEach(c=>payload[c.key]=c.p);
    const res=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(data.success){el.className='save-state ok'; el.textContent='✅ تم حفظ نتيجتك بنجاح.';}
    else{el.className='save-state err'; el.textContent='تعذّر الحفظ: '+(data.message||'');}
  }catch(err){el.className='save-state err'; el.textContent='تعذّر الاتصال بالخادم — النتيجة ظاهرة لكنها لم تُحفظ.'; console.error(err);}
}

function resetAnswers(){ answers.fill(null); idx=0; $('saveState').textContent=''; $('saveState').className='save-state'; }

$('anotherBtn').addEventListener('click',()=>{ resetAnswers(); $('employeeName').value=''; $('designation').value=''; show('intro'); $('employeeName').focus(); });
$('restartBtn').addEventListener('click',()=>{ resetAnswers(); $('employeeName').value=''; $('designation').value=''; show('intro'); $('branchName').focus(); });

// Neon ripple for start button
document.getElementById('startBtn').addEventListener('click', function(e) {
  const btn = this;
  const ripple = document.createElement('span');
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
  btn.appendChild(ripple);
  btn.classList.remove('neon-clicked');
  void btn.offsetWidth;
  btn.classList.add('neon-clicked');
  setTimeout(() => ripple.remove(), 700);
}, true);

// Theme toggle
const themeBtn = document.getElementById('themeToggle');
const knob = themeBtn.querySelector('.toggle-knob');
const savedTheme = localStorage.getItem('outfit_theme') || 'dark';
if (savedTheme === 'light') {
  document.body.classList.add('light');
  knob.textContent = '☀️';
}
themeBtn.addEventListener('click', () => {
  const isLight = document.body.classList.toggle('light');
  knob.textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('outfit_theme', isLight ? 'light' : 'dark');
});
</script>
</body>
</html>
